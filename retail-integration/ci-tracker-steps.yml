# ci-tracker-steps.yml
# These steps add Project Tracker status reporting to the retail repo's ci.yml.
# Add the TRACKER_* secrets to the retail repo's GitHub Actions secrets, then
# merge these steps into the corresponding jobs in .github/workflows/ci.yml.
#
# Required GitHub secrets in the RETAIL repo:
#   TRACKER_API_URL    https://project-tracker-lyart-seven.vercel.app
#   TRACKER_API_TOKEN  SJWOAIPJNOIDLE
#
# How to use:
#   Copy the relevant env block and steps into each job in ci.yml.
#   The "start" step goes BEFORE the job's main work.
#   The "success" step uses `if: success()`.
#   The "failure" step uses `if: failure()`.

# ── Helper shell function (paste into run: blocks) ───────────────────────────
