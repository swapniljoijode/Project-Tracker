# app.yml — CODE pipeline
# Runs when application code changes. Lints, type-checks, builds, and will
# deploy to Vercel (wired in Phase T8). Never runs for data-only changes
# (tracker_tasks.yaml edits go through sync-template.yml instead).

name: App

on:
  push:
    branches: [main]
    paths-ignore:
      - tracker_tasks.yaml
      - "**.md"
  pull_request:
    branches: [main]

jobs:
  quality:
    name: Lint and type-check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Type-check
        run: npm run type-check

      - name: Build
        run: npm run build
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          TRACKER_API_TOKEN: ${{ secrets.TRACKER_API_TOKEN }}
          NEXT_PUBLIC_APP_URL: ${{ secrets.NEXT_PUBLIC_APP_URL }}

  # deploy:   ← wired in Phase T8 after Vercel is provisioned
