# app.yml — CODE pipeline
# Runs when application code changes. Never runs for data-only changes
# (tracker_tasks.yaml edits go through sync-template.yml instead).
#
# Two jobs:
#   quality — lint, type-check, test (ephemeral Postgres), build
#   deploy  — Vercel production deploy (main branch only, after quality)
#
# Required GitHub secrets:
#   DATABASE_URL          Neon connection string (used by build only)
#   TRACKER_API_TOKEN     API write token
#   NEXT_PUBLIC_APP_URL   Deployed URL e.g. https://project-tracker.vercel.app
#   VERCEL_TOKEN          From vercel.com → Settings → Tokens
#   VERCEL_ORG_ID         From .vercel/project.json after `vercel link`
#   VERCEL_PROJECT_ID     From .vercel/project.json after `vercel link`

name: App

on:
  push:
    branches: [main]
    paths-ignore:
      - tracker_tasks.yaml
      - "**.md"
  pull_request:
    branches: [main]

jobs:
  # ── Quality gate ─────────────────────────────────────────────────────────────
  quality:
    name: Lint, test, build
    runs-on: ubuntu-latest

    services:
      # Ephemeral Postgres for replication tests.
      # Tests never touch the production Neon database.
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: tracker
          POSTGRES_PASSWORD: tracker
          POSTGRES_DB: tracker
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Type-check
        run: npm run type-check

      - name: Migrate test database
        run: npm run db:migrate
        env:
          DATABASE_URL: postgresql://tracker:tracker@localhost:5432/tracker?sslmode=disable

      - name: Replication tests
        run: npm test
        env:
          DATABASE_URL: postgresql://tracker:tracker@localhost:5432/tracker?sslmode=disable

      - name: Build
        run: npm run build
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          TRACKER_API_TOKEN: ${{ secrets.TRACKER_API_TOKEN }}
          NEXT_PUBLIC_APP_URL: ${{ secrets.NEXT_PUBLIC_APP_URL }}

  # ── Deploy ────────────────────────────────────────────────────────────────────
  deploy:
    name: Deploy to Vercel
    needs: quality
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Deploy (production)
        run: npx vercel --prod --yes --token ${{ secrets.VERCEL_TOKEN }}
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
